apiVersion: 1

providers:
  - name: 'RAG Monitoring Dashboards'
    orgId: 1
    folder: 'RAG Monitoring'
    folderUid: 'rag-monitoring'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

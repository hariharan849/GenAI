server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: status
            values: ["running"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
    pipeline_stages:
      - match:
          selector: '{service="api"}'
          stages:
            - regex:
                expression: '(?P<level>INFO|WARNING|ERROR|DEBUG|CRITICAL)'
            - labels:
                level:
      - match:
          selector: '{service=~"airflow.*"}'
          stages:
            - regex:
                expression: '(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d+) - (?P<logger>[^ ]+) - (?P<level>INFO|WARNING|ERROR|DEBUG|CRITICAL)'
            - labels:
                level:
                logger:
      - match:
          selector: '{service="nginx"}'
          stages:
            - json:
                expressions:
                  method: method
                  uri: uri
                  status: status
                  request_time: request_time
            - labels:
                method:
                status:

mappings:

  - match: "airflow.dagrun.duration.success.*"
    name: "airflow_dagrun_duration_seconds"
    labels:
      status: "success"
      dag_id: "$1"
    observer_type: histogram
    buckets: [10, 30, 60, 120, 300, 600, 1800, 3600]

  - match: "airflow.dagrun.duration.failed.*"
    name: "airflow_dagrun_duration_seconds"
    labels:
      status: "failed"
      dag_id: "$1"
    observer_type: histogram
    buckets: [10, 30, 60, 120, 300, 600, 1800, 3600]

  - match: "airflow.dagrun.success.*"
    name: "airflow_dagrun_total"
    labels:
      status: "success"
      dag_id: "$1"

  - match: "airflow.dagrun.failed.*"
    name: "airflow_dagrun_total"
    labels:
      status: "failed"
      dag_id: "$1"

  - match: "airflow.ti.duration.*.*.*"
    name: "airflow_task_duration_seconds"
    labels:
      dag_id: "$1"
      task_id: "$2"
      status: "$3"
    observer_type: histogram
    buckets: [1, 5, 10, 30, 60, 120, 300, 600]

  - match: "airflow.ti_successes"
    name: "airflow_task_instance_total"
    labels:
      status: "success"

  - match: "airflow.ti_failures"
    name: "airflow_task_instance_total"
    labels:
      status: "failed"

  - match: "airflow.scheduler.heartbeat"
    name: "airflow_scheduler_heartbeat_total"
    labels: {}

  - match: "airflow.scheduler.tasks.pending"
    name: "airflow_scheduler_tasks_pending"
    labels: {}

  - match: "airflow.celery.worker_online"
    name: "airflow_celery_worker_online"
    labels: {}

  - match: "airflow.pool.open_slots.*"
    name: "airflow_pool_open_slots"
    labels:
      pool_name: "$1"

  - match: "airflow.pool.used_slots.*"
    name: "airflow_pool_used_slots"
    labels:
      pool_name: "$1"

  - match: "airflow.dag_processing.total_parse_time"
    name: "airflow_dag_processing_total_parse_time_seconds"
    labels: {}

  - match: "airflow.*"
    name: "airflow_generic"
    labels:
      metric: "$1"

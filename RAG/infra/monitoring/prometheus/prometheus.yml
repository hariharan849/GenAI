global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    project: arxiv-rag

alerting:
  alertmanagers: []

scrape_configs:

  - job_name: 'rag-api'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'rag-api'
          component: 'fastapi'
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'airflow-statsd'
    static_configs:
      - targets: ['statsd-exporter:9102']
        labels:
          service: 'airflow'
          component: 'statsd-exporter'
    scrape_interval: 30s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'host'
          component: 'node-exporter'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

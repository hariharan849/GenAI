  # ── Monitoring stack ──────────────────────────────────────────────────────

  statsd-exporter:
    image: prom/statsd-exporter:v0.28.0
    container_name: rag-statsd-exporter
    command:
      - "--statsd.listen-udp=:9125"
      - "--statsd.listen-tcp=:9125"
      - "--web.listen-address=:9102"
      - "--web.telemetry-path=/metrics"
      - "--statsd.mapping-config=/etc/statsd_exporter/statsd_mapping.yml"
    ports:
      - "9125:9125/udp"
      - "9125:9125/tcp"
      - "9102:9102"
    volumes:
      - ./infra/monitoring/statsd_exporter/statsd_mapping.yml:/etc/statsd_exporter/statsd_mapping.yml:ro
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9102/metrics > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: rag-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9099:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - rag-network
    restart: unless-stopped
    depends_on:
      - statsd-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:12.0.1
    container_name: rag-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - rag-network
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:3.5.1
    container_name: rag-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./infra/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.5.1
    container_name: rag-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rag-network
    restart: unless-stopped
    depends_on:
      - loki

  # ── Application services ──────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    env_file:
      - ${ENV_FILE_PATH:-.env}
    environment:
      - CORS_ORIGINS=["http://localhost","http://localhost:3002","http://localhost:3000"]
    ports:
      - "8083:8000"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: rag-ui
    ports:
      - "3004:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - FASTAPI_INTERNAL_URL=http://api:8000
    networks:
      - rag-network
    restart: unless-stopped
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:1.27-alpine
    container_name: rag-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - ui
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dagster-user-code:
    build:
      context: .
      dockerfile: orchestrators/dagster/Dockerfile
    container_name: rag-dagster-user-code
    environment:
      SERVICE: code-server
      DAGSTER_HOME: /app
    env_file:
      - .env
    networks:
      - rag-network
    profiles: [dagster]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',4000)); s.close()\""]
      interval: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  dagster-webserver:
    build:
      context: .
      dockerfile: orchestrators/dagster/Dockerfile
    container_name: rag-dagster-webserver
    environment:
      SERVICE: webserver
      DAGSTER_HOME: /app
    env_file:
      - .env
    ports:
      - "3002:3000"
    networks:
      - rag-network
    profiles: [dagster]
    depends_on:
      dagster-user-code:
        condition: service_healthy
      postgres:
        condition: service_healthy
      dagster-daemon:
        condition: service_started
    restart: unless-stopped

  dagster-daemon:
    build:
      context: .
      dockerfile: orchestrators/dagster/Dockerfile
    container_name: rag-dagster-daemon
    environment:
      SERVICE: daemon
      DAGSTER_HOME: /app
    env_file:
      - .env
    networks:
      - rag-network
    profiles: [dagster]
    depends_on:
      dagster-user-code:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  opensearch_data:
  valkey_data:
  clickhouse_data:
  langfuse_v3_minio_data:
  langfuse_redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  prefect-db:

networks:
  rag-network:
    driver: bridge
